<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Solar System Simulator</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@300;400;500;600;700&family=Space+Mono:wght@400;700&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    html, body {
      width: 100%; height: 100%; overflow: hidden;
      background: #000;
      font-family: 'Space Grotesk', sans-serif;
      color: #fff;
    }

    canvas { display: block; width: 100%; height: 100%; position: relative; z-index: 0; }

    #info-bar {
      position: absolute;
      top: 20px; left: 50%;
      transform: translateX(-50%);
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 3px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.35);
      pointer-events: none;
      user-select: none;
    }

    #speed-control {
      position: absolute;
      bottom: 28px; left: 50%;
      transform: translateX(-50%);
      display: flex;
      align-items: center;
      gap: 14px;
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 10px 24px;
      z-index: 10;
    }

    #speed-control label {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.4);
    }

    #speed-control span {
      font-family: 'Space Mono', monospace;
      font-size: 12px;
      color: rgba(255,255,255,0.7);
      min-width: 40px;
      text-align: center;
    }

    #speed-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 160px;
      height: 2px;
      background: rgba(255,255,255,0.12);
      border-radius: 2px;
      outline: none;
      cursor: pointer;
    }

    #pause-play {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.7);
      font-size: 14px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
      z-index: 10;
    }

    #pause-play:hover {
      background: rgba(20,20,35,0.8);
      color: #fff;
    }

    #speed-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px; height: 14px;
      border-radius: 50%;
      background: #f5a623;
      box-shadow: 0 0 10px rgba(245,166,35,0.4);
      cursor: pointer;
    }

    #star-toggle {
      position: absolute;
      bottom: 28px; left: 32px;
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 10px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, color 0.2s;
    }

    #star-toggle:hover {
      background: rgba(20,20,35,0.8);
      color: #fff;
    }

    #label-toggle {
      position: absolute;
      bottom: 72px; left: 32px;
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 10px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, color 0.2s;
    }

    #label-toggle:hover {
      background: rgba(20,20,35,0.8);
      color: #fff;
    }

    #orbit-toggle {
      position: absolute;
      bottom: 116px; left: 32px;
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 10px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, color 0.2s;
    }

    #orbit-toggle:hover {
      background: rgba(20,20,35,0.8);
      color: #fff;
    }

    #bright-toggle {
      position: absolute;
      bottom: 160px; left: 32px;
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 40px;
      padding: 10px 20px;
      font-family: 'Space Mono', monospace;
      font-size: 11px;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: rgba(255,255,255,0.8);
      cursor: pointer;
      z-index: 10;
      transition: background 0.2s, color 0.2s;
    }

    #bright-toggle:hover {
      background: rgba(20,20,35,0.8);
      color: #fff;
    }

    #menu-toggle {
      position: absolute;
      top: 20px; left: 20px;
      width: 40px; height: 40px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.08);
      background: rgba(10,10,20,0.7);
      backdrop-filter: blur(12px);
      color: rgba(255,255,255,0.7);
      font-size: 16px;
      cursor: pointer;
      z-index: 51;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    #menu-toggle:hover {
      background: rgba(20,20,35,0.8);
      color: #fff;
    }

    #planet-menu {
      position: absolute;
      top: 70px; left: 20px;
      background: rgba(10,10,20,0.85);
      backdrop-filter: blur(12px);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 16px;
      padding: 16px 0;
      z-index: 50;
      min-width: 160px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      display: none;
    }

    .menu-header {
      font-family: 'Space Mono', monospace;
      font-size: 10px;
      letter-spacing: 2px;
      color: rgba(255,255,255,0.3);
      padding: 0 16px 8px;
      border-bottom: 1px solid rgba(255,255,255,0.06);
      margin-bottom: 4px;
    }

    .menu-item {
      display: flex;
      align-items: center;
      gap: 10px;
      width: 100%;
      background: none;
      border: none;
      padding: 10px 16px;
      font-family: 'Space Grotesk', sans-serif;
      font-size: 14px;
      color: rgba(255,255,255,0.75);
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
      text-align: left;
    }

    .menu-item:hover {
      background: rgba(255,255,255,0.06);
      color: #fff;
    }

    .menu-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      flex-shrink: 0;
    }

    #planet-menu::-webkit-scrollbar { width: 4px; }
    #planet-menu::-webkit-scrollbar-track { background: transparent; }
    #planet-menu::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    #planet-overlay {
      position: absolute;
      top: 0; left: 0;
      width: 100%; height: 100%;
      pointer-events: none;
      z-index: 100;
      display: none;
    }

    #planet-overlay.active { display: block; }

    #overlay-backdrop {
      position: absolute;
      inset: 0;
      pointer-events: all;
    }

    #planet-card {
      position: absolute;
      pointer-events: all;
      top: 20px;
      right: 24px;
      width: 340px;
      max-height: calc(100vh - 40px);
      overflow-y: auto;
      background: rgba(8, 8, 20, 0.82);
      backdrop-filter: blur(20px);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 20px;
      padding: 36px 32px 32px;
      animation: cardSlideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1) forwards;
      opacity: 0;
    }

    #planet-card::-webkit-scrollbar { width: 4px; }
    #planet-card::-webkit-scrollbar-track { background: transparent; }
    #planet-card::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.15); border-radius: 2px; }

    @keyframes cardSlideIn {
      from { opacity: 0; transform: translateX(30px); }
      to   { opacity: 1; transform: translateX(0); }
    }

    #card-close {
      position: absolute;
      top: 16px; right: 16px;
      width: 32px; height: 32px;
      border: none;
      background: rgba(255,255,255,0.06);
      border-radius: 50%;
      color: rgba(255,255,255,0.5);
      font-size: 16px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.2s, color 0.2s;
    }

    #card-close:hover {
      background: rgba(255,255,255,0.12);
      color: #fff;
    }

    .card-planet-name {
      font-family: 'Space Grotesk', sans-serif;
      font-size: 28px;
      font-weight: 700;
      letter-spacing: -0.5px;
      margin-bottom: 4px;
    }

    .card-planet-tagline {
      font-size: 12px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
      margin-bottom: 24px;
    }

    .card-divider {
      width: 40px; height: 2px;
      border-radius: 1px;
      margin-bottom: 24px;
    }

    .card-stat {
      display: flex;
      justify-content: space-between;
      align-items: baseline;
      padding: 10px 0;
      border-bottom: 1px solid rgba(255,255,255,0.04);
    }

    .card-stat-label {
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 1px;
      text-transform: uppercase;
      font-family: 'Space Mono', monospace;
    }

    .card-stat-value {
      font-size: 14px;
      font-weight: 500;
      color: rgba(255,255,255,0.85);
    }

    .card-fact {
      margin-top: 24px;
      padding: 16px;
      background: rgba(255,255,255,0.03);
      border-radius: 12px;
      border-left: 2px solid;
      font-size: 13px;
      line-height: 1.6;
      color: rgba(255,255,255,0.55);
    }

    .card-fact strong {
      color: rgba(255,255,255,0.8);
    }

    /* cursor hint */
    canvas { cursor: grab; }
    canvas:active { cursor: grabbing; }
  </style>
</head>
<body>
  <div id="info-bar">Solar System &mdash; Drag to orbit &middot; Scroll to zoom</div>

  <div id="speed-control">
    <button id="pause-play">⏸</button>
    <label>Speed</label>
    <input type="range" id="speed-slider" min="0" max="5" step="0.1" value="1" />
    <span id="speed-value">1.0×</span>
  </div>

  <button id="star-toggle">Stars: ON</button>
  <button id="label-toggle">Labels: ON</button>
  <button id="orbit-toggle">Orbits: ON</button>
  <button id="bright-toggle">Bright: OFF</button>

  <button id="menu-toggle">☰</button>
  <div id="planet-menu">
    <div class="menu-header">NAVIGATE</div>
    <button class="menu-item" data-planet="Sun">
      <span class="menu-dot" style="background:#ffcc33"></span>Sun
    </button>
    <button class="menu-item" data-planet="Mercury">
      <span class="menu-dot" style="background:#8c8c8c"></span>Mercury
    </button>
    <button class="menu-item" data-planet="Venus">
      <span class="menu-dot" style="background:#e6c229"></span>Venus
    </button>
    <button class="menu-item" data-planet="Earth">
      <span class="menu-dot" style="background:#6b93d6"></span>Earth
    </button>
    <button class="menu-item" data-planet="Mars">
      <span class="menu-dot" style="background:#c1440e"></span>Mars
    </button>
    <button class="menu-item" data-planet="Jupiter">
      <span class="menu-dot" style="background:#d4a574"></span>Jupiter
    </button>
    <button class="menu-item" data-planet="Saturn">
      <span class="menu-dot" style="background:#f4d59c"></span>Saturn
    </button>
    <button class="menu-item" data-planet="Pluto">
      <span class="menu-dot" style="background:#c9b1a0"></span>Pluto
    </button>
    <button class="menu-item" data-planet="Moon">
      <span class="menu-dot" style="background:#aaaaaa"></span>Moon
    </button>
  </div>

  <div id="planet-overlay">
    <div id="overlay-backdrop"></div>
    <div id="planet-card">
      <button id="card-close">&times;</button>
      <div class="card-planet-name" id="card-name">Earth</div>
      <div class="card-planet-tagline" id="card-tagline">Third Planet</div>
      <div class="card-divider" id="card-divider"></div>
      <div class="card-stat">
        <span class="card-stat-label">Distance</span>
        <span class="card-stat-value" id="card-distance">1.00 AU</span>
      </div>
      <div class="card-stat">
        <span class="card-stat-label">Distance (km)</span>
        <span class="card-stat-value" id="card-distance-km">149.6 M km</span>
      </div>
      <div class="card-stat">
        <span class="card-stat-label">Orbital Period</span>
        <span class="card-stat-value" id="card-period">1.000 yr</span>
      </div>
      <div class="card-stat">
        <span class="card-stat-label">Radius</span>
        <span class="card-stat-value" id="card-radius">1.000 R⊕</span>
      </div>
      <div class="card-fact" id="card-fact"></div>
    </div>
  </div>

  <script type="importmap">
  {
    "imports": {
      "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
      "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
    }
  }
  </script>

  <script type="module">
    import * as THREE from 'three';
    import { OrbitControls } from 'three/addons/controls/OrbitControls.js';

    /* ============================================================
       PLANET DATA
       ============================================================ */
    const AU = 14; // visual scale: 1 AU = 14 units

    const PLANETS = [
      {
        name: 'Mercury', tagline: 'Swift messenger',
        auDist: 0.387, period: 0.241, radius: 0.383,
        inclination: 7.0, eccentricity: 0.206,
        color: 0x8c8c8c, emissive: 0x1a1a1a,
        fact: 'Despite being closest to the Sun, Mercury is <strong>not the hottest planet</strong> — Venus holds that title due to its thick greenhouse atmosphere. A day on Mercury lasts 59 Earth days.'
      },
      {
        name: 'Venus', tagline: 'Morning star',
        auDist: 0.723, period: 0.615, radius: 0.949,
        inclination: 3.4, eccentricity: 0.007,
        color: 0xe6c229, emissive: 0x3a2e00,
        fact: 'Venus rotates <strong>backwards</strong> compared to most planets, and a single day on Venus (243 Earth days) is longer than its year (225 Earth days). Its surface temperature reaches 465 °C.'
      },
      {
        name: 'Earth', tagline: 'Our home',
        auDist: 1.000, period: 1.000, radius: 1.000,
        inclination: 0.0, eccentricity: 0.017,
        color: 0x6b93d6, emissive: 0x0a1a3a,
        fact: 'Earth is the <strong>only known planet with liquid water</strong> on its surface. About 71% of the surface is covered in water, and it is the densest planet in the Solar System.'
      },
      {
        name: 'Mars', tagline: 'The red frontier',
        auDist: 1.524, period: 1.881, radius: 0.532,
        inclination: 1.9, eccentricity: 0.093,
        color: 0xc1440e, emissive: 0x2a0e00,
        fact: 'Mars has the <strong>tallest volcano in the Solar System</strong> — Olympus Mons, standing 21.9 km high (nearly 3× Everest). Mars also has two small moons, Phobos and Deimos.'
      },
      {
        name: 'Jupiter', tagline: 'Gas giant',
        auDist: 5.203, period: 11.86, radius: 11.21,
        inclination: 1.3, eccentricity: 0.049,
        color: 0xd4a574, emissive: 0x2a1e0e,
        fact: 'Jupiter is the <strong>largest planet in the Solar System</strong> — more than 1,300 Earths could fit inside it. Its Great Red Spot is a storm that has been raging for at least 350 years.'
      },
      {
        name: 'Saturn', tagline: 'Lord of the rings',
        auDist: 9.537, period: 29.46, radius: 9.45,
        inclination: 2.5, eccentricity: 0.057,
        color: 0xf4d59c, emissive: 0x2a2200,
        fact: 'Saturn\'s <strong>rings are made mostly of ice and rock</strong>, ranging from tiny grains to house-sized chunks. Despite its massive size, Saturn is the <strong>least dense planet</strong> — it would float in water if you could find a bathtub big enough.'
      },
      {
        name: 'Pluto',
        tagline: 'Dwarf planet',
        auDist: 39.482,
        period: 247.94,
        radius: 0.186,
        inclination: 17.16,
        eccentricity: 0.249,
        color: 0xc9b1a0,
        emissive: 0x1a0e00,
        fact: 'Pluto was <strong>reclassified as a dwarf planet in 2006</strong> by the IAU. It has five known moons, the largest being Charon — so large that Pluto-Charon is sometimes considered a <strong>binary system</strong>. A day on Pluto lasts about 6.4 Earth days.'
      }
    ];

    /* ============================================================
       SCENE SETUP
       ============================================================ */
    const renderer = new THREE.WebGLRenderer({ antialias: true, powerPreference: 'high-performance' });
    renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    renderer.toneMappingExposure = 1.0;
    document.body.prepend(renderer.domElement);

    const scene = new THREE.Scene();
    scene.fog = new THREE.FogExp2(0x000005, 0.001);

    const camera = new THREE.PerspectiveCamera(48, window.innerWidth / window.innerHeight, 0.1, 2000);
    camera.position.set(28, 32, 50);

    const controls = new OrbitControls(camera, renderer.domElement);
    controls.enableDamping = true;
    controls.dampingFactor = 0.06;
    controls.minDistance = 2;
    controls.maxDistance = 600;
    controls.maxPolarAngle = Math.PI * 0.85;
    controls.target.set(0, 0, 0);

    // Camera animation state
    const cameraAnim = {
      active: false,
      startPos: new THREE.Vector3(),
      endPos: new THREE.Vector3(),
      startTarget: new THREE.Vector3(),
      endTarget: new THREE.Vector3(),
      progress: 0,
      duration: 1.2, // seconds
      tracking: false         // continuously follow selected planet
    };

    /* ============================================================
       STARFIELD
       ============================================================ */
    function createStarfield() {
      const count = 6000;
      const positions = new Float32Array(count * 3);
      const colors = new Float32Array(count * 3);
      const sizes = new Float32Array(count);

      for (let i = 0; i < count; i++) {
        const theta = Math.random() * Math.PI * 2;
        const phi = Math.acos(2 * Math.random() - 1);
        const r = 300 + Math.random() * 400;

        positions[i * 3]     = r * Math.sin(phi) * Math.cos(theta);
        positions[i * 3 + 1] = r * Math.sin(phi) * Math.sin(theta);
        positions[i * 3 + 2] = r * Math.cos(phi);

        const temp = Math.random();
        if (temp > 0.92) {
          colors[i*3] = 0.7; colors[i*3+1] = 0.8; colors[i*3+2] = 1.0;
        } else if (temp > 0.85) {
          colors[i*3] = 1.0; colors[i*3+1] = 0.95; colors[i*3+2] = 0.7;
        } else {
          const b = 0.6 + Math.random() * 0.4;
          colors[i*3] = b; colors[i*3+1] = b; colors[i*3+2] = b;
        }

        sizes[i] = 0.3 + Math.random() * 1.2;
      }

      const geo = new THREE.BufferGeometry();
      geo.setAttribute('position', new THREE.BufferAttribute(positions, 3));
      geo.setAttribute('color', new THREE.BufferAttribute(colors, 3));
      geo.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

      const mat = new THREE.PointsMaterial({
        size: 0.8,
        vertexColors: true,
        transparent: true,
        opacity: 1.0,
        sizeAttenuation: true,
        depthWrite: false
      });

      return new THREE.Points(geo, mat);
    }

    const starfield = createStarfield();
    scene.add(starfield);

    /* ============================================================
       LIGHTING
       ============================================================ */
    const sunLight = new THREE.PointLight(0xfff0dd, 2.5, 0, 0.5);
    sunLight.position.set(0, 0, 0);
    scene.add(sunLight);

    const ambientLight = new THREE.AmbientLight(0x1a1a2e, 0.25);
    scene.add(ambientLight);

    // Bright mode light — off by default, toggled by user
    const brightLight = new THREE.HemisphereLight(0xffffff, 0x444466, 0);
    scene.add(brightLight);
    const brightDirLight = new THREE.DirectionalLight(0xffffff, 0);
    brightDirLight.position.set(10, 20, 10);
    scene.add(brightDirLight);

    /* ============================================================
       SUN
       ============================================================ */
    const sunGroup = new THREE.Group();
    scene.add(sunGroup);

    // Core sphere — procedural plasma shader
    const sunVertexShader = `
      varying vec2 vUv;
      varying vec3 vNormal;
      void main() {
        vUv = uv;
        vNormal = normalize(normalMatrix * normal);
        gl_Position = projectionMatrix * modelViewMatrix * vec4(position, 1.0);
      }
    `;

    const sunFragmentShader = `
      uniform float uTime;
      varying vec2 vUv;
      varying vec3 vNormal;

      // Simplex noise functions
      vec3 mod289(vec3 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 mod289(vec4 x) { return x - floor(x * (1.0 / 289.0)) * 289.0; }
      vec4 permute(vec4 x) { return mod289(((x*34.0)+1.0)*x); }
      vec4 taylorInvSqrt(vec4 r) { return 1.79284291400159 - 0.85373472095314 * r; }

      float snoise(vec3 v) {
        const vec2 C = vec2(1.0/6.0, 1.0/3.0);
        const vec4 D = vec4(0.0, 0.5, 1.0, 2.0);
        vec3 i = floor(v + dot(v, C.yyy));
        vec3 x0 = v - i + dot(i, C.xxx);
        vec3 g = step(x0.yzx, x0.xyz);
        vec3 l = 1.0 - g;
        vec3 i1 = min(g.xyz, l.zxy);
        vec3 i2 = max(g.xyz, l.zxy);
        vec3 x1 = x0 - i1 + C.xxx;
        vec3 x2 = x0 - i2 + C.yyy;
        vec3 x3 = x0 - D.yyy;
        i = mod289(i);
        vec4 p = permute(permute(permute(
          i.z + vec4(0.0, i1.z, i2.z, 1.0))
          + i.y + vec4(0.0, i1.y, i2.y, 1.0))

        float n_ = 0.142857142857;
        vec3 ns = n_ * D.wyz - D.xzx;
        vec4 j = p - 49.0 * floor(p * ns.z * ns.z);
        vec4 x_ = floor(j * ns.z);
        vec4 y_ = floor(j - 7.0 * x_);
        vec4 x = x_ * ns.x + ns.yyyy;
        vec4 y = y_ * ns.x + ns.yyyy;
        vec4 h = 1.0 - abs(x) - abs(y);
        vec4 b0 = vec4(x.xy, y.xy);
        vec4 b1 = vec4(x.zw, y.zw);
        vec4 s0 = floor(b0)*2.0 + 1.0;
        vec4 s1 = floor(b1)*2.0 + 1.0;
        vec4 sh = -step(h, vec4(0.0));
        vec4 a0 = b0.xzyw + s0.xzyw*sh.xxyy;
        vec4 a1 = b1.xzyw + s1.xzyw*sh.zzww;
        vec3 p0 = vec3(a0.xy,h.x);
        vec3 p1 = vec3(a0.zw,h.y);
        vec3 p2 = vec3(a1.xy,h.z);
        vec3 p3 = vec3(a1.zw,h.w);
        vec4 norm = taylorInvSqrt(vec4(dot(p0,p0), dot(p1,p1), dot(p2,p2), dot(p3,p3)));

        float n = fbm(uv);
        float detail = fbm(uv * 3.0 + 10.0);
        float icePatches = smoothstep(0.45, 0.6, fbm(uv * 1.5 + 5.0));
        vec3 base = vec3(0.76, 0.70, 0.63);
        vec3 lightIce = vec3(0.88, 0.85, 0.80);
        vec3 darkRock = vec3(0.55, 0.48, 0.42);
        vec3 color = mix(darkRock, base, n);
        color = mix(color, lightIce, icePatches * 0.6);
        color += detail * 0.04;
        vec3 lightDir = normalize(-vWorldPos);
        float diff = max(dot(vNormal, lightDir), 0.0);
        float ambient = 0.08 + uBrightness * 0.25;
        color *= ambient + (1.0 - ambient) * diff;
        gl_FragColor = vec4(color, 1.0);
      }
    `;

    // Map planet names to their fragment shaders
    const planetShaders = {
      Mercury: mercuryFragShader,
      Venus: venusFragShader,
      Earth: earthFragShader,
      Mars: marsFragShader,
      Jupiter: jupiterFragShader,
      Saturn: saturnFragShader,
      Pluto: plutoFragShader
    };

    PLANETS.forEach(p => {
      const dist = p.auDist * AU;
      let visRadius = 0.2 + p.radius * 0.55;
      if (p.name === 'Jupiter') visRadius = Math.min(0.2 + p.radius * 0.25, 1.2);
      if (p.name === 'Saturn') visRadius = Math.min(0.2 + p.radius * 0.25, 1.0);
      if (p.name === 'Pluto') visRadius = Math.max(visRadius, 0.25);

      // Orbit pivot
      const pivot = new THREE.Group();
      scene.add(pivot);

      // Orbit ring
      const orbitRing = createOrbitRing(dist, p.eccentricity, p.inclination);
      scene.add(orbitRing);
      orbitRings.push(orbitRing);

      // Planet group (holds position on orbit + self-rotation)
      const planetGroup = new THREE.Group();
      pivot.add(planetGroup);

      // Mesh — procedural shader material
      const geo = new THREE.SphereGeometry(visRadius, 48, 48);
      const fragShader = planetShaders[p.name] || mercuryFragShader;
      const mat = new THREE.ShaderMaterial({
        uniforms: {
          uTime: { value: 0 },
          uBrightness: { value: 0.0 }
        },
        vertexShader: planetVertexShader,
        fragmentShader: fragShader
      });
      const mesh = new THREE.Mesh(geo, mat);
      mesh.position.x = dist;
      mesh.castShadow = true;
      mesh.receiveShadow = true;
      planetGroup.add(mesh);

      // Atmosphere glow for Earth
      if (p.name === 'Earth') {
        const atmoGeo = new THREE.SphereGeometry(visRadius * 1.15, 32, 32);
        const atmoMat = new THREE.MeshBasicMaterial({
          color: 0x4488ff,
          transparent: true,
          opacity: 0.08,
          depthWrite: false,
          side: THREE.BackSide
        });
        const atmo = new THREE.Mesh(atmoGeo, atmoMat);
        mesh.add(atmo);
      }

      // Saturn's rings
      if (p.name === 'Saturn') {
        const ringGeo = new THREE.RingGeometry(visRadius * 1.4, visRadius * 2.2, 64);
        const ringMat = new THREE.MeshBasicMaterial({
          color: 0xc8b078,
          transparent: true,
          opacity: 0.5,
          side: THREE.DoubleSide,
          depthWrite: false
        });
        const ring = new THREE.Mesh(ringGeo, ringMat);
        ring.rotation.x = Math.PI * 0.45;
        mesh.add(ring);
      }

      // Earth's Moon
      if (p.name === 'Earth') {
        const moonGeo = new THREE.SphereGeometry(0.1, 24, 24);
        const moonMat = new THREE.ShaderMaterial({
          uniforms: {
            uTime: { value: 0 },
            uBrightness: { value: 0.0 }
          },
          vertexShader: planetVertexShader,
          fragmentShader: moonFragShader
        });
        moonMesh = new THREE.Mesh(moonGeo, moonMat);
        moonMesh.userData = {
          planetName: 'Moon',
          tagline: "Earth's companion",
          auDist: 0,
          period: 0,
          radius: 0.273,
          visRadius: 0.1,
          color: '#aaaaaa',
          fact: 'The Moon is <strong>the only other world humans have set foot on</strong>. It is slowly drifting away from Earth at about 3.8 cm per year, and it always shows the same face to us because its rotation is tidally locked.'
        };
        moonMesh.position.x = 1.2;
        mesh.add(moonMesh);

        const moonLabel = createLabel('Moon');
        moonLabel.position.y = 0.35;
        moonMesh.add(moonLabel);
        labelSprites.push(moonLabel);
      }

      // Planet label
      const label = createLabel(p.name);
      label.position.y = visRadius + 0.8;
      mesh.add(label);
      labelSprites.push(label);

      // Store references
      mesh.userData = {
        planetName: p.name,
        tagline: p.tagline,
        auDist: p.auDist,
        period: p.period,
        radius: p.radius,
        visRadius: visRadius,
        color: '#' + new THREE.Color(p.color).getHexString(),
        fact: p.fact
      };

      planetMeshes.push(mesh);
      planetGroups.push(pivot);
      raycasterTargets.push(mesh);
    });

    // Add Sun and Moon as clickable targets
    raycasterTargets.push(sunMesh);
    if (moonMesh) raycasterTargets.push(moonMesh);

    /* ============================================================
       RAYCASTER & CLICK
       ============================================================ */
    const raycaster = new THREE.Raycaster();
    const pointer = new THREE.Vector2();
    const overlay = document.getElementById('planet-overlay');
    const backdrop = document.getElementById('overlay-backdrop');
    const cardClose = document.getElementById('card-close');
    let selectedPlanet = null;

    function openCard(mesh, event) {
      const d = mesh.userData;
      document.getElementById('card-name').textContent = d.planetName;
      document.getElementById('card-tagline').textContent = d.tagline;
      document.getElementById('card-distance').textContent = d.auDist.toFixed(3) + ' AU';
      document.getElementById('card-distance-km').textContent = (d.auDist * 149.6).toFixed(1) + ' M km';
      document.getElementById('card-period').textContent = d.period.toFixed(3) + ' yr';
      document.getElementById('card-radius').textContent = d.radius.toFixed(3) + ' R⊕';
      document.getElementById('card-fact').innerHTML = d.fact;

      const divider = document.getElementById('card-divider');
      divider.style.background = d.color;

      overlay.classList.add('active');
      selectedPlanet = mesh;

      // --- Camera: fly to the planet ---
      const worldPos = new THREE.Vector3();
      mesh.getWorldPosition(worldPos);

      // Direction from origin toward the planet (stays in the ecliptic-ish plane)
      const dirToPlanet = worldPos.clone().normalize();
      const dist = worldPos.length();
      const viewDist = Math.max(d.visRadius * 16, 4);

      // Camera sits behind+above the planet relative to the Sun,
      // shifted slightly left so the planet sits center-left (card is on the right)
      const camPos = dirToPlanet.clone().multiplyScalar(-viewDist * 0.35)
        .add(new THREE.Vector3(0, viewDist * 0.45, 0))
        .add(worldPos);

      cameraAnim.startPos.copy(camera.position);
      cameraAnim.endPos.copy(camPos);
      cameraAnim.startTarget.copy(controls.target);
      cameraAnim.endTarget.copy(worldPos);
      cameraAnim.progress = 0;
      cameraAnim.active = true;

      // Disable OrbitControls during fly-to so controls.update() doesn't fight us
      controls.enabled = false;

      // --- Card: position it so it's fully visible ---
      const card = document.getElementById('planet-card');
      // Let browser layout first, then measure and clamp
      requestAnimationFrame(() => {
        requestAnimationFrame(() => {
          const rect = card.getBoundingClientRect();
          const vh = window.innerHeight;
          const margin = 16;
          let top = (vh - rect.height) / 2;
          top = Math.max(margin, Math.min(vh - rect.height - margin, top));
          card.style.top = top + 'px';
        });
      });
    }

    function closeCard() {
      overlay.classList.remove('active');
      selectedPlanet = null;
      cameraAnim.active = false;
      cameraAnim.tracking = false;
      controls.target.set(0, 0, 0);
      controls.update();
      controls.enabled = true;
    }

    let pointerDownPos = null;

    function onPointerDown(event) {
      if (event.target.closest('#planet-card') || event.target.closest('#speed-control')) return;

      pointerDownPos = { x: event.clientX, y: event.clientY };

      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(raycasterTargets, false);

      if (hits.length > 0) {
        openCard(hits[0].object, event);
      }
    }

    function onPointerUp(event) {
      if (!pointerDownPos) return;
      const dx = event.clientX - pointerDownPos.x;
      const dy = event.clientY - pointerDownPos.y;
      const dragged = Math.sqrt(dx * dx + dy * dy) > 5;
      pointerDownPos = null;

      // Don't close card while tracking — only backdrop, close button, or Escape close it
      if (cameraAnim.tracking) return;
      if (dragged) return;
      if (event.target.closest('#planet-card') || event.target.closest('#speed-control')) return;

      pointer.x = (event.clientX / window.innerWidth) * 2 - 1;
      pointer.y = -(event.clientY / window.innerHeight) * 2 + 1;
      raycaster.setFromCamera(pointer, camera);
      const hits = raycaster.intersectObjects(raycasterTargets, false);

      if (hits.length === 0 && overlay.classList.contains('active')) {
        closeCard();
      }
    }

    backdrop.addEventListener('pointerdown', closeCard);
    cardClose.addEventListener('pointerdown', (e) => { e.stopPropagation(); closeCard(); });
    renderer.domElement.addEventListener('pointerdown', onPointerDown);
    renderer.domElement.addEventListener('pointerup', onPointerUp);

    /* ============================================================
       SPEED CONTROL
       ============================================================ */
    const speedSlider = document.getElementById('speed-slider');
    const speedValue = document.getElementById('speed-value');
    let simSpeed = 1;

    speedSlider.addEventListener('input', () => {
      simSpeed = parseFloat(speedSlider.value);
      speedValue.textContent = simSpeed.toFixed(1) + '×';
    });

    /* ============================================================
       STAR TOGGLE
       ============================================================ */
    const starToggle = document.getElementById('star-toggle');

    starToggle.addEventListener('click', () => {
      starfield.visible = !starfield.visible;
      starToggle.textContent = starfield.visible ? 'Stars: ON' : 'Stars: OFF';
    });

    /* ============================================================
       LABEL TOGGLE
       ============================================================ */
    const labelToggle = document.getElementById('label-toggle');
    let labelsVisible = true;

    labelToggle.addEventListener('click', () => {
      labelsVisible = !labelsVisible;
      labelSprites.forEach(s => { s.visible = labelsVisible; });
      labelToggle.textContent = labelsVisible ? 'Labels: ON' : 'Labels: OFF';
    });

    /* ============================================================
       ORBIT TOGGLE
       ============================================================ */
    const orbitToggle = document.getElementById('orbit-toggle');
    let orbitsVisible = true;

    orbitToggle.addEventListener('click', () => {
      orbitsVisible = !orbitsVisible;
      orbitRings.forEach(r => { r.visible = orbitsVisible; });
      orbitToggle.textContent = orbitsVisible ? 'Orbits: ON' : 'Orbits: OFF';
    });

    /* ============================================================
       BRIGHT TOGGLE
       ============================================================ */
    const brightToggle = document.getElementById('bright-toggle');
    let brightOn = false;

    brightToggle.addEventListener('click', () => {
      brightOn = !brightOn;
      brightLight.intensity = brightOn ? 1.2 : 0;
      brightDirLight.intensity = brightOn ? 0.8 : 0;
      brightToggle.textContent = brightOn ? 'Bright: ON' : 'Bright: OFF';
    });

    /* ============================================================
       PLANET MENU
       ============================================================ */
    const menuToggle = document.getElementById('menu-toggle');
    const planetMenu = document.getElementById('planet-menu');
    const menuItems = document.querySelectorAll('.menu-item');
    let menuOpen = false;

    menuToggle.addEventListener('click', () => {
      menuOpen = !menuOpen;
      planetMenu.style.display = menuOpen ? 'block' : 'none';
      menuToggle.textContent = menuOpen ? '✕' : '☰';
    });

    // Build a lookup map of name → mesh
    const bodyMeshMap = {};
    PLANETS.forEach((p, i) => {
      bodyMeshMap[p.name] = planetMeshes[i];
    });
    bodyMeshMap['Sun'] = sunMesh;
    if (moonMesh) bodyMeshMap['Moon'] = moonMesh;

    menuItems.forEach(btn => {
      btn.addEventListener('click', () => {
        const name = btn.dataset.planet;
        const mesh = bodyMeshMap[name];
        if (mesh) {
          openCard(mesh, null);
        }
        // Close the menu after selection
        menuOpen = false;
        planetMenu.style.display = 'none';
        menuToggle.textContent = '☰';
      });
    });

    /* ============================================================
        PAUSE / PLAY
        ============================================================ */
    const pauseBtn = document.getElementById('pause-play');
    let isPaused = false;
    pauseBtn.addEventListener('click', () => {
      isPaused = !isPaused;
      pauseBtn.textContent = isPaused ? '\u25B6' : '\u23F8';
    });

    /* ============================================================
        ANIMATION LOOP
        ============================================================ */
    const clock = new THREE.Clock();

    function animate() {
      requestAnimationFrame(animate);
      const delta = clock.getDelta();
      const elapsed = clock.elapsedTime;
      const time = elapsed * simSpeed;

      // Sun pulsing
      const sunTime = sunMat.uniforms.uTime;
      if (sunTime) sunTime.value = elapsed;

      const pulse = 1 + Math.sin(elapsed * 2) * 0.02;
      sunMesh.scale.setScalar(pulse);

      // Glow breathing
      glowMeshes.forEach((g, i) => {
        const breathe = 1 + Math.sin(elapsed * (1.5 + i * 0.3)) * 0.04;
        g.scale.setScalar(breathe);
      });

      // Flare breathing
      if (flare1) flare1.material.opacity = 0.4 + Math.sin(elapsed * 1.8) * 0.1;
      if (flare2) flare2.material.opacity = 0.3 + Math.sin(elapsed * 2.2) * 0.08;
      if (flare3) flare3.material.opacity = 0.15 + Math.sin(elapsed * 1.2) * 0.05;

      coronaSprite.scale.set(
        10 * (1 + Math.sin(elapsed * 1.5) * 0.08),
        10 * (1 + Math.sin(elapsed * 1.5) * 0.08), 1
      );
      coronaMat.opacity = 0.6 + Math.sin(elapsed * 2.2) * 0.1;

      if (!isPaused) {
        // Orbital motion (parametric Kepler-like) + self-rotation
        planetMeshes.forEach((mesh, i) => {
          // Update procedural shader time
          if (mesh.material.uniforms && mesh.material.uniforms.uTime) {
            mesh.material.uniforms.uTime.value = elapsed;
          }
          if (mesh.material.uniforms && mesh.material.uniforms.uBrightness) {
            mesh.material.uniforms.uBrightness.value = brightOn ? 1.0 : 0.0;
          }
          const p = PLANETS[i];
          const orbitSpeed = (2 * Math.PI) / (p.period * 30);
          const angle = orbitSpeed * time;
          const ecc = p.eccentricity || 0;
          const inc = (p.inclination || 0) * Math.PI / 180;

          // Parametric ellipse
          const dist = p.auDist * AU;
          const r = dist * (1 - ecc * ecc) / (1 + ecc * Math.cos(angle));
          const x = r * Math.cos(angle);
          const z = r * Math.sin(angle);

          // Apply inclination (rotate around X axis)
          const y = z * Math.sin(inc);
          const zFinal = z * Math.cos(inc);

          mesh.position.set(x, y, zFinal);

          // Self rotation
          mesh.rotation.y += delta * 0.3 * (1 + i * 0.2) * simSpeed;
        });

        // Moon orbit
        if (moonMesh) {
          moonMesh.position.x = Math.cos(elapsed * 2.5) * 1.2;
          moonMesh.position.z = Math.sin(elapsed * 2.5) * 1.2;
          // Update Moon procedural shader
          if (moonMesh.material.uniforms && moonMesh.material.uniforms.uTime) {
            moonMesh.material.uniforms.uTime.value = elapsed;
          }
          if (moonMesh.material.uniforms && moonMesh.material.uniforms.uBrightness) {
            moonMesh.material.uniforms.uBrightness.value = brightOn ? 1.0 : 0.0;
          }
        }
      }

      // Camera animation (smooth lerp to target planet)
      if (cameraAnim.active) {
        cameraAnim.progress += delta / cameraAnim.duration;
        if (cameraAnim.progress >= 1) {
          cameraAnim.progress = 1;
          cameraAnim.active = false;
          // Fly complete — start tracking the selected planet
          if (selectedPlanet) {
            const wp = new THREE.Vector3();
            selectedPlanet.getWorldPosition(wp);
            controls.target.copy(wp);
            controls.enabled = true;
            cameraAnim.tracking = true;
          }
        }
        // Smooth ease-out curve
        const t = 1 - Math.pow(1 - cameraAnim.progress, 3);
        
        camera.position.lerpVectors(cameraAnim.startPos, cameraAnim.endPos, t);
        controls.target.lerpVectors(cameraAnim.startTarget, cameraAnim.endTarget, t);
      }

      // Continuous tracking — follow the selected planet each frame
      if (cameraAnim.tracking && selectedPlanet) {
        const wp = new THREE.Vector3();
        selectedPlanet.getWorldPosition(wp);
        controls.target.lerp(wp, 0.08);
      } else if (cameraAnim.tracking) {
        cameraAnim.tracking = false;
      }

      controls.update();
      renderer.render(scene, camera);
    }

    animate();

    /* ============================================================
       RESIZE
       ============================================================ */
    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    /* ============================================================
       KEYBOARD
       ============================================================ */
    window.addEventListener('keydown', (e) => {
      if (e.key === 'Escape') closeCard();
    });

  </script>
</body>
</html>
